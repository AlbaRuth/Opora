################################################################################
# Opora - Docker Compose Configuration
# -----------------------------------------------------------------------------
# Сервисы:
#   - postgres: PostgreSQL 15 для хранения данных
#
# Использование:
#   1. Скопируйте .env.example в .env и настройте переменные
#   2. Запустите: docker-compose up -d
#   3. Примените миграции: python scripts/migrate.py upgrade
#   4. Запустите бота: python bot_runner.py
#
# Для запуска бота в контейнере раскомментируйте сервис bot ниже
# (миграции выполнятся автоматически перед стартом)
#
# Переменные окружения читаются из .env файла автоматически
################################################################################

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: opora-postgres
    restart: unless-stopped
    environment:
      # Читаем значения из .env или используем дефолтные
      POSTGRES_DB: ${POSTGRES_DB:-opora}
      POSTGRES_USER: ${POSTGRES_USER:-opora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opora}
      # Настройки PostgreSQL для production
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    volumes:
      - opora_postgres_data:/var/lib/postgresql/data
      # Опционально: скрипты инициализации
      - ./scripts/docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opora} -d ${POSTGRES_DB:-opora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opora-network
    # Лимиты ресурсов для production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # Opora Bot (запускается в Docker для работы с postgres в одной сети)
  bot:
    image: python:3.11-slim
    container_name: opora-bot
    restart: unless-stopped
    working_dir: /app
    environment:
      # DATABASE_URL для подключения к postgres внутри Docker сети
      DATABASE_URL: postgresql+asyncpg://opora:opora@postgres:5432/OporaAssistant
      APP_ENV: development
      LOG_LEVEL: INFO
      LOG_FILE_ENABLED: "true"
      LOG_FILE_PATH: logs/app.log
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LANGFUSE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opora-network
    volumes:
      - .:/app:cached
      - /app/.venv
    command: >
      sh -c "
        pip install -e . -q 2>/dev/null || pip install -r requirements.txt -q 2>/dev/null &&
        alembic upgrade head &&
        python bot_runner.py
      "

volumes:
  opora_postgres_data:
    driver: local

networks:
  opora-network:
    driver: bridge
